<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0c14;
            --bg-card: rgba(20, 24, 38, 0.6);
            --accent-primary: #6366f1;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 350px;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            padding: 16px;
        }

        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-box {
            width: 52px;
            height: 52px;
            margin: 0 auto 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-logo { width: 100%; height: 100%; object-fit: contain; }

        .auth-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
            color: #fff;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .auth-alert {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-bottom: 16px;
        }

        .auth-alert.error {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .auth-alert.success {
            background: rgba(16, 185, 129, 0.1);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .input-group input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        /* SVG Icons Simulation */
        .icon-overlay {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            opacity: 0.5;
        }

        .auth-submit {
            margin-top: 8px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            background: var(--accent-primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .auth-submit:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        .auth-submit:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
        }

        .prototype-hint {
            margin-bottom: 16px;
            padding: 14px;
            background: rgba(99, 102, 241, 0.05);
            border: 1px dashed rgba(99, 102, 241, 0.3);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .prototype-hint:hover {
            background: rgba(99, 102, 241, 0.1);
            border-style: solid;
        }

        .prototype-hint span {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--accent-primary);
            margin-bottom: 2px;
        }

        .prototype-hint p {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin: 0;
        }

        .btn-text {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-text:hover { color: var(--accent-primary); }

        /* Dashboard View */
        #dashboard-view {
            text-align: center;
        }

        .dashboard-status {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .pulse-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--accent-success);
            text-transform: uppercase;
            font-weight: 800;
            margin-top: 20px;
        }

        .pulse {
            width: 6px;
            height: 6px;
            background: var(--accent-success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-success);
            animation: pulse-kf 2s infinite;
        }

        @keyframes pulse-kf {
            0% { transform: scale(0.95); opacity: 0.5; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <!-- Login Mode -->
        <div id="login-view">
            <div class="auth-header">
                <div class="logo-box">
                    <img src="icons/icon48.png" alt="Blostem" class="auth-logo">
                </div>
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Intelligence-driven sales automation</p>
            </div>

            <div id="login-alert" class="auth-alert error" style="display: none;"></div>

            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <!-- Mail Icon (Minimal SVG) -->
                    <svg class="icon-overlay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" id="login-email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <!-- Lock Icon (Minimal SVG) -->
                    <svg class="icon-overlay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>

                <button type="submit" id="login-btn" class="auth-submit">
                    <span>Login Intelligence</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <div class="auth-footer">
                <div class="prototype-hint" id="prototype-btn">
                    <span>PROTOTYPE ACCESS</span>
                    <p>One-click auto-fill for MVP testing</p>
                </div>
                <button class="btn-text" id="to-register">Don't have an invite? Join Waitlist</button>
            </div>
        </div>

        <!-- Register Mode -->
        <div id="register-view" style="display: none;">
            <div class="auth-header">
                <div class="logo-box">
                    <img src="icons/icon48.png" alt="Blostem" class="auth-logo">
                </div>
                <h1>Join Blostem</h1>
                <p class="auth-subtitle">Invite-only early access</p>
            </div>

            <div id="register-alert" class="auth-alert error" style="display: none;"></div>

            <form class="auth-form" id="register-form">
                <div class="input-group">
                    <svg class="icon-overlay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="reg-name" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <svg class="icon-overlay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" id="reg-email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <svg class="icon-overlay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="reg-password" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <svg class="icon-overlay" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="reg-invite" placeholder="Invitation Code" required>
                </div>

                <button type="submit" id="register-btn" class="auth-submit">
                    <span>Unlock Access</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>

            <div class="auth-footer">
                <button class="btn-text" id="to-login">Already have an account? Login</button>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" style="display: none;">
            <div class="auth-header">
                <div class="logo-box">
                    <img src="icons/icon48.png" alt="Blostem" class="auth-logo">
                </div>
                <h1>Assistant Active</h1>
            </div>
            <p class="dashboard-status">
                Intelligence Engine is synced with your Gmail workspace.
            </p>
            <a href="http://localhost:5173" target="_blank" class="auth-submit" style="text-decoration: none;">
                <span>Open Platform</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
            </a>
            <button id="logout-btn" class="btn-text" style="margin-top: 20px;">Disconnect Session</button>
            
            <div class="pulse-box">
                <div class="pulse"></div>
                Engine Active
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
